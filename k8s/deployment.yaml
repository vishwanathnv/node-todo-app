apiVersion: apps/v1
kind: Deployment

metadata:
  name: todo-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: todo-app

  template:

    metadata:
      labels:
        app: todo-app

    spec:

      containers:

      - name: todo-app

        image: vishu66/nodejs_web:v1

        ports:

        - containerPort: 8000
